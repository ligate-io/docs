# Tracked upstream-artifact versions.
# Source of truth for the `bump-versions` workflow at
# `.github/workflows/bump-versions.yml`. The workflow compares this
# against the latest published release of each upstream repo; on
# mismatch it sed-replaces the literal version (and v-prefix variant)
# across files listed in `.versions-paths.txt`, updates this manifest,
# and opens an auto-PR for review.
chain: "0.2.13"
