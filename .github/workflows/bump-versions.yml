name: bump-versions

# Auto-PR when a tracked upstream artifact ships a new release. Reads
# the current pinned version from `.versions.yml`, fetches the latest
# release tag for each tracked source via the GitHub API, and on any
# mismatch sed-replaces the literal version across the paths listed in
# `.versions-paths.txt`.
#
# Three triggers:
#   1. Daily cron — safety net so we never drift more than 24h.
#   2. `workflow_dispatch` — manual on-demand run from the Actions tab.
#   3. `repository_dispatch` from the sender (chain repo's release.yml
#      dispatches a `chain-released` event after publishing a tag).
#
# Phase 2 (chain#468 follow-up) tracks chain only. Phase 3 extends to
# cli / sdk / api by appending entries to `.versions.yml` and
# `.versions-paths.txt`.

on:
  schedule:
    # 07:00 UTC daily. Chain releases ship infrequently; a 24-hour
    # safety net is plenty if the repository_dispatch path is broken.
    - cron: '0 7 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [chain-released, cli-released, sdk-released, api-released]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read current pinned versions
        id: cur
        run: |
          echo "chain=$(yq '.chain' .versions.yml)" >> $GITHUB_OUTPUT

      - name: Fetch latest upstream releases
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHAIN_TAG=$(gh release view -R ligate-io/ligate-chain --json tagName --jq '.tagName')
          # Strip leading 'v' so the manifest format stays bare-semver.
          echo "chain=${CHAIN_TAG#v}" >> $GITHUB_OUTPUT

      - name: Bump version pins if any changed
        id: bump
        env:
          OLD_CHAIN: ${{ steps.cur.outputs.chain }}
          NEW_CHAIN: ${{ steps.latest.outputs.chain }}
        run: |
          changed=0
          if [[ "$OLD_CHAIN" != "$NEW_CHAIN" ]]; then
            echo "::notice::chain $OLD_CHAIN → $NEW_CHAIN"
            yq -i ".chain = \"$NEW_CHAIN\"" .versions.yml
            # Build the path list from `.versions-paths.txt` (skip
            # comments + blanks) and sed-replace both the bare-semver
            # and v-prefixed forms. Idempotent: re-running with the
            # same OLD/NEW is a no-op.
            paths=$(grep -vE '^\s*(#|$)' .versions-paths.txt | tr '\n' ' ')
            if [[ -n "$paths" ]]; then
              # shellcheck disable=SC2086
              sed -i "s|v${OLD_CHAIN}|v${NEW_CHAIN}|g; s|${OLD_CHAIN}|${NEW_CHAIN}|g" $paths
            fi
            changed=1
          fi
          echo "changed=$changed" >> $GITHUB_OUTPUT

      - name: Open auto-PR
        if: steps.bump.outputs.changed == '1'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump chain pin to v${{ steps.latest.outputs.chain }}"
          branch: chore/bump-chain-v${{ steps.latest.outputs.chain }}
          delete-branch: true
          title: "chore: bump chain pin to v${{ steps.latest.outputs.chain }}"
          body: |
            **Automated by `bump-versions.yml`.**

            Chain version pin bumped: `${{ steps.cur.outputs.chain }}` → `${{ steps.latest.outputs.chain }}`.

            Files touched are the ones listed in `.versions-paths.txt`. The literal version string was replaced exactly, both in bare-semver (`${{ steps.cur.outputs.chain }}`) and v-prefixed (`v${{ steps.cur.outputs.chain }}`) forms.

            [Chain release notes →](https://github.com/ligate-io/ligate-chain/releases/tag/v${{ steps.latest.outputs.chain }})

            ---

            Triggered by: `${{ github.event_name }}`.
