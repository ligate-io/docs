name: bump-versions

# Auto-PR when a tracked upstream artifact ships a new release. Reads
# the current pinned versions from `.versions.yml`, fetches the latest
# release tag for each tracked source via the GitHub API, and on any
# mismatch sed-replaces the literal version across the per-source
# file lists in `.versions-paths.d/<source>.txt`.
#
# Three triggers:
#   1. Daily cron (07:00 UTC) — 24-hour safety net.
#   2. `workflow_dispatch` — manual on-demand from the Actions tab.
#   3. `repository_dispatch` — push events from upstream release.yml
#      workflows (`chain-released`, `cli-released`, etc.).
#
# Sources tracked today: chain, cli, sdk, api. To add a new one,
# append a key to `.versions.yml`, create the matching
# `.versions-paths.d/<key>.txt`, and add `<key>-released` to the
# `repository_dispatch.types` array below.

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
  repository_dispatch:
    types:
      - chain-released
      - cli-released
      - sdk-released
      - api-released

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Pre-emptive: when Dependabot eventually bumps to
          # actions/checkout@v6, the v6 default of
          # `persist-credentials: true` collides with
          # `peter-evans/create-pull-request@v6`'s own `Authorization`
          # header, producing `Duplicate header` and a git HTTP 400.
          # Setting this now (harmless on v4) keeps the auto-bump
          # workflow green across that future bump. See
          # ligate-io/ligate-chain#501 for the reactive fix after it
          # broke there on the chain v0.3.1 release dispatch.
          persist-credentials: false

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Iterate tracked sources + sed-bump any that drifted
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          changed_sources=()
          summary=""
          # Map of local-key → GitHub repo. Keep ordered with .versions.yml.
          declare -A repos=(
            [chain]="ligate-io/ligate-chain"
            [cli]="ligate-io/ligate-cli"
            [sdk]="ligate-io/ligate-js"
            [api]="ligate-io/ligate-api"
          )
          for src in chain cli sdk api; do
            repo="${repos[$src]}"
            paths_file=".versions-paths.d/${src}.txt"
            old=$(yq ".$src" .versions.yml)
            # `gh release view` returns non-zero on repos with zero
            # tagged releases (api today). Soft-fail so the workflow
            # continues for the other sources.
            new_tag=$(gh release view -R "$repo" --json tagName --jq '.tagName' 2>/dev/null || echo "")
            new="${new_tag#v}"
            if [[ -z "$new" ]]; then
              echo "::notice::$src ($repo) has no releases yet; skipping"
              continue
            fi
            if [[ "$old" == "$new" ]]; then
              echo "$src: already at $new"
              continue
            fi
            echo "::notice::$src $old → $new"
            yq -i ".${src} = \"${new}\"" .versions.yml
            if [[ -f "$paths_file" ]]; then
              paths=$(grep -vE '^\s*(#|$)' "$paths_file" | tr '\n' ' ')
              if [[ -n "$paths" ]]; then
                # shellcheck disable=SC2086
                sed -i "s|v${old}|v${new}|g; s|${old}|${new}|g" $paths
              fi
            fi
            changed_sources+=("$src")
            summary="${summary}- **${src}**: \`${old}\` → \`${new}\` ([release notes](https://github.com/${repo}/releases/tag/v${new}))\n"
          done
          if [[ ${#changed_sources[@]} -gt 0 ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "sources_csv=$(IFS=,; echo "${changed_sources[*]}")" >> $GITHUB_OUTPUT
            # Multiline output via heredoc-style.
            {
              echo "summary<<EOF"
              echo -e "$summary"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Open auto-PR
        if: steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: auto-bump tracked pins (${{ steps.bump.outputs.sources_csv }})'
          branch: chore/bump-pins
          delete-branch: true
          title: 'chore: auto-bump tracked pins (${{ steps.bump.outputs.sources_csv }})'
          body: |
            **Automated by `bump-versions.yml`.**

            ${{ steps.bump.outputs.summary }}

            Files touched come from the per-source `.versions-paths.d/<source>.txt` lists. The literal version was replaced exactly, both bare-semver and v-prefixed.

            ---

            Triggered by: `${{ github.event_name }}`.
